apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-app
      version: green
  template:
    metadata:
      labels:
        app: devops-app
        version: green
    spec:
      containers:
      - name: devops-app
        image: devops-app
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: VERSION
          value: "Green"